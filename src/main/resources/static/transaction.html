<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banking App - Transactions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="navbar">
        <span class="brand">🏦 Banking Operations</span>
        <div>
            <a href="index.html">Dashboard</a>
            <a href="create-account.html">New Account</a>
            <a href="transaction.html">Transactions</a>
            <a href="history.html">History</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <h1>Transactions</h1>

    <div class="card">
        <div class="action-tabs">
            <button id="depositTab" class="active" onclick="showTab('deposit')">Deposit</button>
            <button id="withdrawTab" onclick="showTab('withdraw')">Withdraw</button>
            <button id="transferTab" onclick="showTab('transfer')">Transfer</button>
        </div>

        <form id="depositForm" class="txn-form">
            <label>Account Number</label>
            <input type="text" id="depositAccNo" required placeholder="e.g. ACCAD45EACE">
            <label>Amount (₹)</label>
            <input type="number" id="depositAmount" min="0.01" step="0.01" required>
            <button type="submit">Deposit</button>
        </form>

        <form id="withdrawForm" class="txn-form" style="display:none;">
            <label>Account Number</label>
            <input type="text" id="withdrawAccNo" required placeholder="e.g. ACCAD45EACE">
            <label>Amount (₹)</label>
            <input type="number" id="withdrawAmount" min="0.01" step="0.01" required>
            <button type="submit">Withdraw</button>
        </form>

        <form id="transferForm" class="txn-form" style="display:none;">
            <label>From Account Number</label>
            <input type="text" id="fromAccNo" required placeholder="e.g. ACCAD45EACE">
            <label>To Account Number</label>
            <input type="text" id="toAccNo" required placeholder="e.g. ACC13525111">
            <label>Amount (₹)</label>
            <input type="number" id="transferAmount" min="0.01" step="0.01" required>
            <button type="submit">Transfer</button>
        </form>

        <p id="message"></p>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8081/api/v1";
    const token = localStorage.getItem("jwtToken");

    if (!token) {
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.removeItem("jwtToken");
        localStorage.removeItem("username");
        window.location.href = "login.html";
    }

    function showTab(tab) {
        ["deposit", "withdraw", "transfer"].forEach(t => {
            document.getElementById(`${t}Form`).style.display = t === tab ? "block" : "none";
            document.getElementById(`${t}Tab`).classList.toggle("active", t === tab);
        });
        document.getElementById("message").textContent = "";
    }

    async function handleApiCall(url, body, messageEl, successMsg) {
        try {
            const res = await fetch(url, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });

            if (res.status === 401 || res.status === 403) {
                logout();
                return;
            }

            const contentType = res.headers.get("content-type");
            const data = contentType && contentType.includes("application/json")
                ? await res.json()
                : await res.text();

            if (!res.ok) {
                const errMsg = typeof data === "object" ? data.message : data;
                throw new Error(errMsg || "Transaction failed");
            }

            messageEl.style.color = "green";
            messageEl.textContent = successMsg;
            return true;
        } catch (err) {
            messageEl.style.color = "red";
            messageEl.textContent = err.message;
            return false;
        }
    }

    document.getElementById("depositForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const accNo = document.getElementById("depositAccNo").value;
        const amount = parseFloat(document.getElementById("depositAmount").value);
        const messageEl = document.getElementById("message");

        const ok = await handleApiCall(
            `${API_BASE}/accounts/${accNo}/deposit`,
            { amount },
            messageEl,
            `Deposited ₹${amount} successfully!`
        );
        if (ok) this.reset();
    });

    document.getElementById("withdrawForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const accNo = document.getElementById("withdrawAccNo").value;
        const amount = parseFloat(document.getElementById("withdrawAmount").value);
        const messageEl = document.getElementById("message");

        const ok = await handleApiCall(
            `${API_BASE}/accounts/${accNo}/withdraw`,
            { amount },
            messageEl,
            `Withdrew ₹${amount} successfully!`
        );
        if (ok) this.reset();
    });

    document.getElementById("transferForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const fromAccountNumber = document.getElementById("fromAccNo").value;
        const toAccountNumber = document.getElementById("toAccNo").value;
        const amount = parseFloat(document.getElementById("transferAmount").value);
        const messageEl = document.getElementById("message");

        const ok = await handleApiCall(
            `${API_BASE}/accounts/transfer`,
            { fromAccountNumber, toAccountNumber, amount },
            messageEl,
            `Transferred ₹${amount} successfully!`
        );
        if (ok) this.reset();
    });
</script>
</body>
</html>
