<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Banking App - New Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="navbar">
        <span class="brand">🏦 Banking Operations</span>
        <div>
            <a href="index.html">Dashboard</a>
            <a href="create-account.html">New Account</a>
            <a href="transaction.html">Transactions</a>
            <a href="history.html">History</a>
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </div>

    <h1>Create New Account</h1>

    <div class="card">
        <form id="createForm">
            <label>Account Holder Name</label>
            <input type="text" id="holderName" required>

            <label>Initial Deposit (₹)</label>
            <input type="number" id="initialDeposit" min="0" step="0.01" required>

            <label>Account Type</label>
            <select id="accountType" required>
                <option value="SAVINGS">Savings</option>
                <option value="CURRENT">Current</option>
            </select>

            <button type="submit">Create Account</button>
        </form>
        <p id="message"></p>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:8081/api/v1";
    const token = localStorage.getItem("jwtToken");

    if (!token) {
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.removeItem("jwtToken");
        localStorage.removeItem("username");
        window.location.href = "login.html";
    }

    document.getElementById("createForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const holderName = document.getElementById("holderName").value;
        const initialDeposit = parseFloat(document.getElementById("initialDeposit").value);
        const type = document.getElementById("accountType").value;
        const messageEl = document.getElementById("message");

        try {
            const res = await fetch(`${API_BASE}/accounts`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ holderName, initialDeposit, type })
            });

            if (res.status === 401 || res.status === 403) {
                logout();
                return;
            }

            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.message || "Failed to create account");
            }

            messageEl.style.color = "green";
            messageEl.textContent = `Account created! Account Number: ${data.accountNumber}`;
            document.getElementById("createForm").reset();
        } catch (err) {
            messageEl.style.color = "red";
            messageEl.textContent = err.message;
        }
    });
</script>
</body>
</html>
